version: 1
applications:
  - appRoot: frontend
    stages:
      preBuild:
        commands:
          - npm ci --prefer-offline
      build:
        commands:
          - NEXT_TELEMETRY_DISABLED=1 npm run build
    artifacts:
      baseDirectory: .next
      files:
        - '**/*'
    cache:
      paths:
        - .next/cache/**/*
        - node_modules/**/*