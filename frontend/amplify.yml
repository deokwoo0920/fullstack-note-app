version: 1
applications:
  - frontend:
      appRoot: frontend
    stages:
      preBuild:
        commands:
          - npm ci --prefer-offline
      build:
        commands:
          # Next.js 빌드가 참조할 수 있도록 캐시 경로 및 환경 명시
          - NEXT_TELEMETRY_DISABLED=1 npm run build
    artifacts:
      baseDirectory: .next
      files:
        - '**/*'
    cache:
      paths:
        - .next/cache/**/*
        - node_modules/**/*